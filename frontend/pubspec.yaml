name: proyecto_de_desarrollo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP
  http: ^1.2.0

  # Almacenamiento seguro del token
  flutter_secure_storage: ^9.0.0

  # Manejo de estado
  provider: ^6.1.2

  # Navegacion
  go_router: ^13.0.0

  # Animaciones Lottie
  lottie: ^3.1.0

  # Animaciones
  flutter_animate: ^4.5.0

  # Fuentes
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/